<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Works — Anna Bonadimani</title>
<link rel="icon" href="assets/Vector.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap-grid.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap-utilities.min.css">
<link rel="stylesheet" href="css\style.css">
<script src="https://kit.fontawesome.com/9475044cb3.js" crossorigin="anonymous"></script>
</head>
<body>

<!-- HEADER -->
<header class="site-header">
  <div class="site-container header-inner">
    <a href="index.html" class="logo">My Portfolio</a>
    <nav class="main-nav">
      <a href="works.html">Works</a>
      <a href="about.html">About</a>
    </nav>
  </div>
</header>

<!-- SELECTED WORKS -->
<section class="section" id="works">
  <div class="site-container">

    <div class="section-head">
      <h2 class="section-title">
        <img class="scribble-icon" src="assets/Vector.svg" alt="" width="30" height="30">
        Selected Works
      </h2>
      <p class="section-desc">
        Discover curated works that inspire and deliver impact, showcasing creativity,
        functionality, and design excellence.
      </p>
    </div>

    <div class="row g-4">

      <div class="col-12 col-md-6">
        <a class="work-card" href="progetto.html">
          <div class="work-thumb">
            <img src="assets/green trips 1.jpg" alt="Green Trips — app mobile per viaggiare in modo eco-friendly">
          </div>

          <div class="work-caption">
            <span class="work-caption-name">Green Trips</span>
            <span class="work-caption-date">DEC 23, 2024</span>
          </div>
        </a>
      </div>

      <div class="col-12 col-md-6">
        <a class="work-card" href="progetto.html">
          <div class="work-thumb">
            <img src="assets/support1.jpg" alt="IT Support Desktop App — app desktop per il supporto IT">
          </div>

          <div class="work-caption">
            <span class="work-caption-name">IT Support Desktop App</span>
            <span class="work-caption-date">FEB 10, 2025</span>
          </div>
        </a>
      </div>

    </div>

  </div>
</section>

<!-- FOOTER -->
<footer class="site-footer" id="contact">
  <div class="site-container">

    <div class="footer-top">
      <h2 class="footer-title">Stay connected</h2>
    </div>

    <form id="contact-form" class="footer-form" action="https://formsubmit.co/anna.bonadimani@outlook.com" method="POST">
      <input type="hidden" name="_subject" value="Nuovo messaggio dal portfolio">
      <input type="hidden" name="_template" value="table">
      <input type="hidden" name="_captcha" value="true">

      <div class="row g-4">
        <div class="col-12 col-md-6 footer-field">
          <label for="cf-name">Name</label>
          <input type="text" id="cf-name" name="Nome" placeholder="Your name" required>
        </div>
        <div class="col-12 col-md-6 footer-field">
          <label for="cf-email">Email</label>
          <input type="email" id="cf-email" name="Email" placeholder="Your email" required>
        </div>
      </div>

      <div class="footer-field">
        <label for="cf-message">Message</label>
        <textarea id="cf-message" name="Messaggio" rows="4" placeholder="Write your message here..." required></textarea>
      </div>

      <button type="submit" class="footer-submit">Send Message</button>
    </form>

    <hr class="footer-divider">

    <div class="footer-bottom">
      <p class="footer-contact">
        2026 © Anna Bonadimani. All rights reserved.
      </p>
      <div class="footer-social">
        <span class="footer-social-label">Follow me</span>
        <nav class="footer-nav">
          <a href="https://www.linkedin.com/in/anna-bonadimani/" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn">
               <i class="fa-brands fa-linkedin iconsize"></i>
          </a>
          <a href="https://www.behance.net/annabonadimani" target="_blank" rel="noopener noreferrer" aria-label="Behance">
               <i class="fa-brands fa-behance iconsize"></i>
          </a>
          <a href="https://github.com/annabonad" target="_blank" rel="noopener noreferrer" aria-label="GitHub">
                           <i class="fa-brands fa-github iconsize"></i>
          </a>
        </nav>
      </div>
    </div>

  </div>
</footer>

</body>
</html>
