<body>

  
<!-- HEADER -->
<header class="site-header">
  <div class="site-container header-inner">
    <a href="index.html" class="logo">My Portfolio</a>
    <nav class="main-nav">
      <a href="works.html">Works</a>
      <a href="about.html">About</a>
    </nav>
  </div>
</header>

<!-- PROJECT PLACEHOLDER -->
<section class="section project-placeholder">
  <div class="site-container">
    <a href="index.html#works" class="link-arrow">← Back to portfolio</a>
    <h1 class="project-placeholder-title">Project page coming soon</h1>
    <p class="project-placeholder-text">
      This case study is still being written. Soon you'll find here the full process,
      screens, and details of this project.
    </p>
  </div>
</section>

<!-- FOOTER -->
<footer class="site-footer" id="contact">
  <div class="site-container">

    <div class="footer-top">
      <h2 class="footer-title">Stay connected</h2>
    </div>

    <form id="contact-form" class="footer-form" action="https://formsubmit.co/anna.bonadimani@outlook.com" method="POST">
      <input type="hidden" name="_subject" value="Nuovo messaggio dal portfolio">
      <input type="hidden" name="_template" value="table">
      <input type="hidden" name="_captcha" value="true">

      <div class="row g-4">
        <div class="col-12 col-md-6 footer-field">
          <label for="cf-name">Name</label>
          <input type="text" id="cf-name" name="Nome" placeholder="Your name" required>
        </div>
        <div class="col-12 col-md-6 footer-field">
          <label for="cf-email">Email</label>
          <input type="email" id="cf-email" name="Email" placeholder="Your email" required>
        </div>
      </div>

      <div class="footer-field">
        <label for="cf-message">Message</label>
        <textarea id="cf-message" name="Messaggio" rows="4" placeholder="Write your message here..." required></textarea>
      </div>

      <button type="submit" class="footer-submit">Send Message</button>
    </form>

    <hr class="footer-divider">

    <div class="footer-bottom">
      <p class="footer-contact">
        2026 © Anna Bonadimani. All rights reserved.
      </p>
      <div class="footer-social">
        <span class="footer-social-label">Follow me</span>
        <nav class="footer-nav">
          <a href="https://www.linkedin.com/in/anna-bonadimani/" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn">
            <i class="fa-brands fa-linkedin iconsize"></i>
          </a>
          <a href="https://www.behance.net/annabonadimani" target="_blank" rel="noopener noreferrer" aria-label="Behance">
            <i class="fa-brands fa-behance iconsize"></i>
          </a>
          <a href="https://github.com/AnnaBonad14" target="_blank" rel="noopener noreferrer" aria-label="GitHub">
            <i class="fa-brands fa-github iconsize"></i>
          </a>
        </nav>
      </div>
    </div>

  </div>
</footer>

</body>
</html>
